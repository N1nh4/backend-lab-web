# PostgreSQL (produção)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/upaagora}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 desabilitado em producao
spring.h2.console.enabled=false

# CORS (aceita o dominio de producao e localhost)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,https://upa-agora.vercel.app}
